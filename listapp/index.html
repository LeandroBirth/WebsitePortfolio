<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today's Focus — Task Picker</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Today's Focus" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Libre+Baskerville:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="paper-texture" aria-hidden="true"></div>

  <div class="layout">

    <!-- Sidebar / Header -->
    <aside class="sidebar">
      <div class="sidebar-inner">
        <div class="logo-mark" aria-hidden="true">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="24" cy="24" r="8" fill="currentColor"/>
            <line x1="24" y1="2" x2="24" y2="14" stroke="currentColor" stroke-width="1.5"/>
            <line x1="24" y1="34" x2="24" y2="46" stroke="currentColor" stroke-width="1.5"/>
            <line x1="2" y1="24" x2="14" y2="24" stroke="currentColor" stroke-width="1.5"/>
            <line x1="34" y1="24" x2="46" y2="24" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>

        <h1 class="app-title">Today's<br/><em>Focus</em></h1>
        <p class="app-date" id="app-date"></p>

        <div class="divider-ornament" aria-hidden="true">
          <span></span><span class="diamond">◆</span><span></span>
        </div>

        <div class="stats-block">
          <div class="stat">
            <span class="stat-value" id="stat-open">0</span>
            <span class="stat-label">Open</span>
          </div>
          <div class="stat-sep" aria-hidden="true">/</div>
          <div class="stat">
            <span class="stat-value" id="stat-done">0</span>
            <span class="stat-label">Done</span>
          </div>
        </div>

        <div class="progress-track" role="progressbar" aria-label="Tasks completed" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" id="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>

        <div class="sidebar-legend">
          <div class="legend-item">
            <span class="legend-swatch swatch-done"></span>
            <span>Swipe left — done</span>
          </div>
          <div class="legend-item">
            <span class="legend-swatch swatch-delete"></span>
            <span>Swipe right — delete</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">

      <!-- Add task -->
      <section class="add-section" aria-label="Add a task">
        <div class="add-row">
          <div class="input-wrapper">
            <label for="task-input" class="input-label">New task</label>
            <input
              type="text"
              id="task-input"
              class="task-input"
              placeholder="What needs to get done today?"
              maxlength="120"
              autocomplete="off"
            />
          </div>
          <button class="btn-add" id="add-btn" aria-label="Add task">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <line x1="9" y1="2" x2="9" y2="16"/>
              <line x1="2" y1="9" x2="16" y2="9"/>
            </svg>
            <span>Add</span>
          </button>
        </div>
      </section>

      <!-- Task list -->
      <section class="tasks-section" aria-label="Task list">
        <div class="section-eyebrow">
          <span class="eyebrow-line" aria-hidden="true"></span>
          <span class="eyebrow-text">Active Tasks</span>
          <span class="eyebrow-line" aria-hidden="true"></span>
        </div>

        <div class="tasks-list" id="tasks-list" role="list"></div>

        <div class="empty-state" id="empty-state" aria-live="polite">
          <p class="empty-headline">The day is a blank canvas.</p>
          <p class="empty-sub">Add your first task above to begin.</p>
        </div>
      </section>

      <!-- Spin / Pick -->
      <section class="pick-section hidden" id="pick-section" aria-label="Pick a random task">
        <div class="section-eyebrow">
          <span class="eyebrow-line" aria-hidden="true"></span>
          <span class="eyebrow-text">Pick for me</span>
          <span class="eyebrow-line" aria-hidden="true"></span>
        </div>

        <div class="pick-stage">
          <div class="pick-result-wrap" id="pick-result-wrap" aria-live="polite" aria-atomic="true">
            <div class="pick-idle" id="pick-idle">
              <span class="pick-idle-text">Press the wheel to let fate decide</span>
            </div>
            <div class="pick-card hidden" id="pick-card">
              <span class="pick-card-label">Focus on</span>
              <span class="pick-card-text" id="pick-card-text"></span>
            </div>
          </div>

          <button class="btn-spin" id="spin-btn" aria-label="Pick a random task">
            <svg class="spin-wheel" id="spin-wheel" width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="26" cy="26" r="24" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="26" cy="26" r="4" fill="currentColor"/>
              <!-- spokes -->
              <line x1="26" y1="2" x2="26" y2="10" stroke="currentColor" stroke-width="1.5"/>
              <line x1="26" y1="42" x2="26" y2="50" stroke="currentColor" stroke-width="1.5"/>
              <line x1="2" y1="26" x2="10" y2="26" stroke="currentColor" stroke-width="1.5"/>
              <line x1="42" y1="26" x2="50" y2="26" stroke="currentColor" stroke-width="1.5"/>
              <line x1="8.69" y1="8.69" x2="14.79" y2="14.79" stroke="currentColor" stroke-width="1.5"/>
              <line x1="37.21" y1="37.21" x2="43.31" y2="43.31" stroke="currentColor" stroke-width="1.5"/>
              <line x1="43.31" y1="8.69" x2="37.21" y2="14.79" stroke="currentColor" stroke-width="1.5"/>
              <line x1="14.79" y1="37.21" x2="8.69" y2="43.31" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <span class="spin-label">Spin</span>
          </button>
        </div>
      </section>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
